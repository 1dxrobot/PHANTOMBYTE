<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhantomByte — Forgot Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="grid-bg"></div>

  <div class="auth-page">
    <div class="auth-container">

      <div class="auth-header">
        <a href="/login" class="logo">
          <span class="logo-hex">⬡</span> PHANTOMBYTE
        </a>
        <p>// PASSWORD RECOVERY PROTOCOL</p>
      </div>

      <div class="card auth-card">
        <div class="corner-tl"></div><div class="corner-tr"></div>
        <div class="corner-bl"></div><div class="corner-br"></div>

        <div style="text-align:center;font-size:2.5rem;margin-bottom:12px;">🔑</div>
        <h2>// RECOVER ACCESS</h2>
        <p style="font-family:var(--font-mono);font-size:0.78rem;color:white;margin-bottom:24px;">
          Enter your registered email to receive an OTP for password reset.
        </p>

        <div id="alert" class="alert"></div>

        <form id="forgot-form">
          <div class="field">
            <label for="email">▸ REGISTERED EMAIL</label>
            <input type="email" id="email" name="email"
                   placeholder="your@email.com" required>
          </div>

          <button type="submit" id="submit-btn" class="btn btn-primary">
            SEND OTP
          </button>
        </form>

        <div class="auth-links">
          <p>REMEMBERED? <a href="/login">BACK TO LOGIN →</a></p>
        </div>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
