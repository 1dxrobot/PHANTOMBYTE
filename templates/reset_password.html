<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhantomByte — Reset Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="grid-bg"></div>

  <div class="auth-page">
    <div class="auth-container">

      <div class="auth-header">
        <a href="/login" class="logo">
          <span class="logo-hex">⬡</span> PHANTOMBYTE
        </a>
        <p>// SET NEW CREDENTIALS</p>
      </div>

      <div class="card auth-card">
        <div class="corner-tl"></div><div class="corner-tr"></div>
        <div class="corner-bl"></div><div class="corner-br"></div>

        <h2>// RESET PASSWORD</h2>

        <div id="alert" class="alert"></div>

        <form id="reset-form">
          <div class="field">
            <label for="password">▸ NEW PASSWORD</label>
            <input type="password" id="password" name="password"
                   placeholder="New strong password" required>
            <div class="pw-strength">
              <div class="pw-bar">
                <div class="pw-bar-fill" id="pw-bar-fill"></div>
              </div>
              <div class="pw-rules">
                <span class="pw-rule" id="rule-upper">Uppercase letter</span>
                <span class="pw-rule" id="rule-lower">Lowercase letter</span>
                <span class="pw-rule" id="rule-number">Number (0-9)</span>
                <span class="pw-rule" id="rule-special">Special character</span>
                <span class="pw-rule" id="rule-length">Min. 8 characters</span>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="confirm_password">▸ CONFIRM NEW PASSWORD</label>
            <input type="password" id="confirm_password" name="confirm_password"
                   placeholder="Repeat new password" required>
          </div>

          <button type="submit" id="submit-btn" class="btn btn-primary">
            RESET PASSWORD
          </button>
        </form>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
